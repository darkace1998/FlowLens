# docker-compose.yml — FlowLens example deployment
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose logs -f        # follow logs
#   docker compose down           # stop and remove containers
#
# This configuration exposes the default collector ports and
# the web dashboard, persisting data via named volumes.

services:
  flowlens:
    build: .
    image: ghcr.io/darkace1998/flowlens:latest
    container_name: flowlens
    restart: unless-stopped
    ports:
      - "2055:2055/udp"   # NetFlow v5/v9
      - "4739:4739/udp"   # IPFIX
      - "6343:6343/udp"   # sFlow v5
      - "8080:8080"       # Web dashboard
    volumes:
      # Persist the SQLite database across container restarts.
      - flowlens-data:/app/data
      # Persist PCAP captures.
      - flowlens-captures:/app/captures
      # Mount a custom config file (optional — remove to use defaults).
      # - ./configs/flowlens.yaml:/app/configs/flowlens.yaml:ro
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  flowlens-data:
    driver: local
  flowlens-captures:
    driver: local
