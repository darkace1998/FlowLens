# Default values for the FlowLens Helm chart.

replicaCount: 1

image:
  repository: ghcr.io/darkace1998/flowlens
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  webPort: 8080
  netflowPort: 2055
  ipfixPort: 4739
  sflowPort: 6343

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: flowlens.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "2"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

persistence:
  data:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  captures:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# FlowLens application config overrides (merged into the default config file).
config: {}
