linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - copyloopvar
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
  prealloc:
    simple: true
    for-loops: true

issues:
  exclude-rules:
    # Test files can use dot imports and skip error checks.
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    # Allow unused parameters in test helpers.
    - path: _test\.go
      linters:
        - unused
  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
